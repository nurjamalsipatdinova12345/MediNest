<div class="col-lg-6">
  <div class="appointment-form-wrapper" data-aos="fade-up" data-aos-delay="200" style="margin-left: 400px">


    <form action="{% url 'home' %}" class="appointment-form" method="POST">
      {% csrf_token %} <input type="hidden" name="form_type" value="appointment">

      <div class="row gy-3">
        <div class="col-md-6">
          <input type="text" name="name" class="form-control" placeholder="Your Full Name" required="">
        </div>

        <div class="col-md-6">
          <input type="email" name="email" class="form-control" placeholder="Your Email" required="">
        </div>

        <div class="col-md-6">
          <input type="tel" name="phone" class="form-control" placeholder="Your Phone Number" required="">
        </div>

        <div class="col-md-6">
          <select name="department" class="form-select" required="">
            <option value="">Select Department</option>
            {% for dept in departments %}
                <option value="{{ dept.id }}">{{ dept.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <input type="datetime-local" name="date" class="form-control" required="">
        </div>

        <div class="col-md-6">
          <select name="doctor" class="form-select" required="">
            <option value="">Select Doctor</option>
            {% for doc in doctors %}
                <option value="{{ doc.id }}">{{ doc.name }} ({{ doc.department.name }})</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-12">
          <textarea class="form-control" name="message" rows="5" placeholder="Symptoms or reason for visit"></textarea>
        </div>

        <div class="col-12">
          <button type="submit" name="appointment_submit" class="btn btn-appointment w-100">
            <i class="bi bi-calendar-plus me-2"></i>Book Appointment
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
