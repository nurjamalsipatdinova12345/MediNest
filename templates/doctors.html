{% load static %}
   
    <!-- Doctors Section -->
    <section id="doctors" class="doctors section">

      <div class="page-title">
      <div class="heading">
        <div class="container">
          <div class="row d-flex justify-content-center text-center">
            <div class="col-lg-8">
              <h1 class="heading-title">Doctors</h1>
              <p class="mb-0">
                MediNest Klinikasindagi doktorlar
              </p>
            </div>
          </div>
        </div>
      </div>
    </div><!-- End Page Title -->

      <div class="container" data-aos="fade-up" data-aos-delay="100">

        
            <div class="row gy-4 isotope-container" data-aos="fade-up" data-aos-delay="300">
              {% for i in doctors %}

              <div class="col-lg-3 col-md-6 doctor-item isotope-item filter-cardiology">
                <article class="doctor-card h-100">
                  <figure class="doctor-media">
                    <img src="{{ i.image.url }}" class="img-fluid" alt="{{ i.name }}" loading="lazy">
                  </figure>
                  <div class="doctor-content">
                    <h3 class="doctor-name">{{ i.name }}</h3>
                    <p class="doctor-title"></p>
                    <p class="doctor-desc">{{ i.specialty }}</p>
                    <div class="doctor-meta">
                      <span class="badge dept">{{ i.department }}</span>
                    </div>
                    <div class="doctor-actions">
                      <a href="#" class="btn btn-sm btn-appointment">Book Appointment</a>
                    </div>
                  </div>
                </article>
              </div><!-- End Directory Item -->
              {% endfor %}
             
      </div>
      </div>

    </section><!-- /Doctors Section -->
