

    <!-- Departments Section -->
    <section id="departments" class="departments section">

      <div class="page-title">
      <div class="heading">
        <div class="container">
          <div class="row d-flex justify-content-center text-center">
            <div class="col-lg-8">
              <h1 class="heading-title">Departments</h1>
              <p class="mb-0">
                MediNest Klinikasindagi bolimler
              </p>
            </div>
          </div>
        </div>
      </div>
    </div><!-- End Page Title -->


      <div class="container" data-aos="fade-up" data-aos-delay="100">

        <div class="row gy-4">
          {% for i in departments %}

          <!-- Department Item -->
          <div class="col-lg-6" data-aos="zoom-in" data-aos-delay="100">
            <div class="department-item">
              <div class="department-content">
                <div class="department-header">
                  <div class="department-icon">
                    <i class="fas fa-heartbeat"></i>
                  </div>
                  <div class="department-info">
                    <h3>{{ i.name }}</h3>

                  </div>
                </div>
                <p>{{ i.description }}</p>
                <div class="department-features">
                  <span class="feature-badge">24/7 Emergency</span>
                  <span class="feature-badge">Advanced Diagnostics</span>
                </div>
              </div>
              <div class="department-image">
                <img src="{{ i.img.url }}" alt="Cardiology Department" class="img-fluid">
                <div class="department-overlay">
                  <a href="#" class="department-link">
                    <i class="fas fa-arrow-right"></i>
                  </a>
                </div>
              </div>
            </div>
          </div><!-- End Department Item -->
          {% endfor %}

        </div>

      </div>

    </section><!-- /Departments Section -->
